r:!0},{id:10,type:"judge",question:"当长时间出现焦虑、失眠等困扰时，应主动向专业人员寻求支持与帮助。",answer:!0},{id:11,type:"judge",question:"对成人进行心肺复苏时，胸外心脏按压须将胸骨向下按压5-6厘米。",answer:!0},{id:12,type:"judge",question:"对传染病患者隔离的主要目的是防止疾病传播。",answer:!0},{id:13,type:"judge",question:"对清醒成年人实施海姆利克急救法时，施救者应站，通过抬高膈肌产生气流压力将异物排出。",answer:!0},{id:14,type:"judge",question:"发生火灾逃生时，可在头部、身上浇冷水，用湿衣服包住头，湿毛巾捂住口鼻，往背离烟火的方向逃生。",answer:!0},{id:15,type:"judge",question:"发现有人落水时，应大声呼救或拨打求助电话，不了解现场水情，切不可轻易下水施救。",answer:!0},{id:16,type:"judge",question:"肥胖会影响运动能力和骨骼发育，对行为、认知及智力没有不良影响。",answer:!1},{id:17,type:"judge",question:"个别同学经努力至就寝时间仍未完成作业，家长应督促其按时就寝不熬夜，确保充足睡眠。",answer:!0},{id:18,type:"judge",question:"过期药品不能随意丢弃，可以继续使用。",answer:!1},{id:19,type:"judge",question:"海姆利克急救法是一种用于解除因异物阻塞气道导致窒息的急救方法。",answer:!0},{id:20,type:"judge",question:"呼吸道疾病通常具有传染性，会通过飞沫、近距离接触等方式传播。",answer:!0},{id:21,type:"judge",question:"踝关节扭伤，可以立刻热敷和按摩。",answer:!1},{id:22,type:"judge",question:'截至2024年底，中国女排已获得11次世界冠军，缔造的"女排精神"成为体育精神的代名词。',answer:!0},{id:23,type:"judge",question:"剧烈运动后身体处于疲劳状态，消化功能暂时减弱，立刻进食可能导致恶心、呕吐等不适。",answer:!0},{id:24,type:"judge",question:"剧烈运动后应及时进行放松拉伸，以缓解疲劳，促进身体机能恢复。",answer:!0},{id:25,type:"judge",question:"剧烈运动后最好的放松方式是直接躺下休息。",answer:!1},{id:26,type:"judge",question:"决定跑速最重要因素是身高、腿长。",answer:!1},{id:27,type:"judge",question:"课间微运动可以打断久坐，促进健康，预防近视，减少焦虑，防止抑郁，提高学习效率。",answer:!0},{id:28,type:"judge",question:"流感会引发很多并发症，严重时甚至会导致死亡，应该及时就诊。",answer:!0},{id:29,type:"judge",question:"每周进行3-5次，每次持续30-50分钟的耐力练习，有助于改善心肺功能，增强肌肉耐力，提升专注力。",answer:!0},{id:30,type:"judge",question:"某同学认为自己不生病、身体健康，就没有必要锻炼身体，每天进行体育锻炼只会耽误宝贵的学学习时间。",answer:!1},{id:31,type:"judge",question:'1952年毛泽东主席为新中国体育的题词是"发展体育运动，增强人民体质"。',answer:!0},{id:32,type:"judge",question:"七步洗手法的步骤是：内（洗掌心）、外（洗手背）、夹（洗指缝）、弓（洗指背）、大（洗拇指）、立（洗指端）、腕（洗手腕）。",answer:!0},{id:33,type:"judge",question:"青春期经常参加体育锻炼能促进身高增长。",answer:!0},{id:34,type:"judge",question:"青春期生理发育的三大显著特点是身体外形变化、内脏功能健全、性器官发育成熟。",answer:!0},{id:35,type:"judge",question:"青少年保持正确的站姿、坐姿有助于预防脊柱侧弯。",answer:!0},{id:36,type:"judge",question:"青少年肥胖可持续至成年，会增加多种慢性病的发病风险，应及早干预。",answer:!0},{id:37,type:"judge",question:"青少年正处于生长发育的关键期，营养过剩会造成肥胖、性早熟等风险。",answer:!0},{id:38,type:"judge",question:"人体是一个有机的整体，是一个完整的系统，各器官系统之间相互配合，共同维持人体的生命活动和健康状态。",answer:!0},{id:39,type:"judge",question:"伤患者倒地，意识丧失没有呼吸与脉搏，应尽快使用体外除颤器（AED），可以增加伤患者存活的机率。",answer:!0},{id:40,type:"judge",question:"身高体重指数（BMI）正确的计算公式是：BMI=体重（kg）/身高(m)²。",answer:!0},{id:41,type:"judge",question:"身高体重指数（BMI）值等于或大于24属于正常体重范围。",answer:!1},{id:42,type:"judge",question:"视力不良会给生活和学习带来不便，还可能会影响未来职业的选择。",answer:!0},{id:43,type:"judge",question:"适量负重运动有益骨骼生长，坚持锻炼能够使骨骼强壮。",answer:!0},{id:44,type:"judge",question:"睡眠质量差会影响情绪。",answer:!0},{id:45,type:"judge",question:"台风预警信号分为五级，从低到高分别白色、蓝色、黄色、橙色、红色，黄色及以上预警信号发布时，全市中小学、幼儿园停课。",answer:!0},{id:46,type:"judge",question:"体育运动可以促进脑部血液循环，增加大脑供氧，提高学习效率，排解消极情绪，预防焦虑和抑郁的发生。",answer:!0},{id:47,type:"judge",question:"体重与心理状态无关，保持良好的心理状态也无助于保持健康体重。",answer:!1},{id:48,type:"judge",question:"田径运动分为田赛和径赛两大类，跨栏属于田赛项目。",answer:!1},{id:49,type:"judge",question:"挑食偏食不利于青春期生长发育。",answer:!0},{id:50,type:"judge",question:'为纪念北京成功举办奥运会及倡导人民群众广泛地参加体育健身，将每年的8月8日定为"全民健身日"。',answer:!0},{id:51,type:"judge",question:"为了预防长时间使用电子设备引起的角膜干燥、眼干涩、视力下降，可多食用富含糖的食物。",answer:!1},{id:52,type:"judge",question:"为预防中暑，可适量饮用含电解质（如钠盐）的饮料，补充因出汗流失的水分和盐分。",answer:!0},{id:53,type:"judge",question:"膝关节是人体最大的关节，由股骨、胫骨和髌骨组成，其主要功能是支撑身体重量和完成屈伸动作。",answer:!0},{id:54,type:"judge",question:"现行乒乓球比赛规则中，规定一方队员发两个球后需要交换发球权。",answer:!0},{id:55,type:"judge",question:"心肺复苏过程中，若患者恢复了自主呼吸，同时又具备明显脉搏，则应将患者置于恢复体位，并严密监测伤患者的呼吸循环功能。",answer:!0},{id:56,type:"judge",question:"心理学研究表明，即使在不愉快的情境下，也可以有效转换情绪，对维护心理健康和应对生活挑战具有显著效果。",answer:!0},{id:57,type:"judge",question:"心率是反映运动强度的唯一指标。",answer:!1},{id:58,type:"judge",question:"学生应当掌握心理健康知识和技能，树立自助与求助意识，学会理性面对困难和挫折。",answer:!0},{id:59,type:"judge",question:"营养摄入不均衡会导致体重过低、生长缓慢、免疫力下降、内分泌失调、骨量下降等。",answer:!0},{id:60,type:"judge",question:"影响青春期心理健康的主要因素有生理因素、家庭因素，但不包括学校因素和社会因素。",answer:!1},{id:61,type:"judge",question:"运动后及时放松，能加快身体疲劳消除，中小学生每次运动后放松10-15分钟，以静态拉伸为主、按摩为辅。",answer:!0},{id:62,type:"judge",question:"运动会上，女生的加油常常会让男生发挥得更好，这是一种心理效应，叫做异性效应。",answer:!0},{id:63,type:"judge",question:"运动结束后可以立即用凉水冲澡降温。",answer:!1},{id:64,type:"judge",question:"运动时比较合理的心率范围应该是最大心率的80%～100%。",answer:!1},{id:65,type:"judge",question:'运动时崴脚应立即停止活动，并遵循"RICE原则"，即休息、冰敷、加压、抬高。',answer:!0},{id:66,type:"judge",question:'"早餐省略、午餐随意、晚餐丰盛"的饮食习惯是有损健康的。',answer:!0},{id:67,type:"judge",question:"在比赛前感到紧张是正常的心理现象，适度的紧张可以激发运动员的专注力和运动表现。",answer:!0},{id:68,type:"judge",question:"在参加800米/1000米测试时，为了节省体力，可以不做准备活动。",answer:!1},{id:69,type:"judge",question:"在公共场所咳嗽或打喷嚏时，正确的做法是用纸巾或手肘遮掩口鼻。",answer:!0},{id:70,type:"judge",question:"在户外运动时遇到雷雨天气，应立即停止运动，寻找安全的避雷场所，远离高耸的树木、电线杆、烟囱等物体。",answer:!0},{id:71,type:"judge",question:"在进行体育锻炼时，要增强安全意识，注意观察场地器材安全标志，如黄色三角形内为黑色图形，以及其他可能指示危险或安全要求的标志。",answer:!0},{id:72,type:"judge",question:"在流感季节，为避免感染，不应该参加任何户外活动。",answer:!1},{id:73,type:"judge",question:"在日常交流中遇到与他人意见不合时，应当把自己的想法强加于他人。",answer:!1},{id:74,type:"judge",question:"在使用全自动体外除颤器（AED）时，要用双手固定伤患者。",answer:!1},{id:75,type:"judge",question:"在体育锻炼时，除了要做好充分的准备活动以外，还要检查活动场地是否安全。",answer:!0},{id:76,type:"judge",question:"在学校出现发热症状、身体严重不适时，要坚持带病上课。",answer:!1},{id:77,type:"judge",question:"在中长跑运动中，出现极点现象时应该加快速度冲向终点。",answer:!1},{id:78,type:"judge",question:"中国第一个在奥运会上获得金牌的运动员是许海峰。",answer:!0},{id:79,type:"judge",question:"足球比赛时，要求运动员戴护腿板，其主要目的是为了跑得更快。",answer:!1},{id:80,type:"judge",question:"充分热身可以降低运动损伤的风险，其内容通常包括慢跑、动态拉伸等，有助于更好地进入运动状态。（重复验证）",answer:!0},{id:81,type:"judge",question:"每周进行3-5次，每次持续30-50分钟的耐力练习，有助于改善心肺功能，增强肌肉耐力，提升专注力。（重复验证）",answer:!0},{id:82,type:"judge",question:"当长时间出现焦虑、失眠等困扰时，应主动向专业人员寻求支持与帮助。（重复验证）",answer:!0},{id:83,type:"judge",question:"人体是一个有机的整体，是一个完整的系统。各器官系统之间相互联系、相互协调、相互依存，共同维持人体的生命活动和健康状态。",answer:!0},{id:84,type:"judge",question:"体育运动可以促进脑部血液循环，增加大脑供氧，提升学习效率，排解消极情绪，预防焦虑和抑郁的发生。",answer:!0},{id:85,type:"judge",question:"在体育锻炼时，除了要做好充分的准备活动以外，还要检查活动场地是否安全。（重复验证）",answer:!0},{id:86,type:"judge",question:"运动后及 judge",question:"肥胖会影响运动能力和骨骼发育，对行为、认知及智力没有不良影响。（重复验证）",answer:!1},{id:111,type:"judge",question:"超重和肥胖是糖尿病、高血压等心脑血管疾病的重要危险因素。（重复验证）",answer:!0},{id:112,type:"judge",question:"青少年肥胖可持续至成年，会增加多种慢性病的发病风险，应及早干预。（重复验证）",answer:!0},{id:113,type:"judge",question:"体重与心理状态无关，保持良好的心理状态也无助于保持健康体重。（重复验证）",answer:!1},{id:114,type:"judge",question:"营养摄入不均衡会导致体重过低，生长缓慢，免疫力下降，内分泌失调，骨量下降等。",answer:!0},{id:115,type:"judge",question:"身高体重指数（BMI）正确的计算公式是：BMI=体重（kg）/身高(m)²。（重复验证）",answer:!0},{id:116,type:"judge",question:"身高体重指数（BMI）值等于或大于24属于正常体重范围。（重复验证）",answer:!1},{id:117,type:"judge",question:"挑食偏食不利于青春期生长发育。（重复验证）",answer:!0},{id:118,type:"judge",question:"膝关节是人体最大的关节，由股骨、胫骨和骨组成，其主要功能是支撑身体重量和完成屈伸动作。",answer:!0},{id:119,type:"judge",question:"流感会引发很多并发症，严重时甚至会导致死亡，应该及时就诊。（重复验证）",answer:!0},{id:120,type:"judge",question:"当身患传染性疾病时，应该尽量少去公共场所，如必须外出，注意佩戴口罩，并与他人保持一米以上距离。（重复验证）",answer:!0},{id:121,type:"judge",question:"呼吸道疾病通常具有传染性，会通过飞沫、近距离接触等方式传播。（重复验证）",answer:!0},{id:122,type:"judge",question:"保持良好的个人卫生与生活习惯也无法有效预防传染性疾病。（重复验证）",answer:!1},{id:123,type:"judge",question:"七步洗手法的步骤是：内（洗掌心）、外（洗手背）、夹（洗指缝）、弓（洗手指背面）、大（洗大拇指）、立（洗指端）、腕（洗手腕）。",answer:!0},{id:124,type:"judge",question:"传染病传播的基本条件是传染源、传播途径和易感人群。（重复验证）",answer:!0},{id:125,type:"judge",question:"传染病在潜伏期不具有传染性，不必及时关注。（重复验证）",answer:!1},{id:126,type:"judge",question:"尝试毒品哪怕是一次，也可能导致成瘾风险，引发身体或心理依赖，并对个人健康、家庭关系和社会安全造成危害。",answer:!0},{id:127,type:"judge",question:"在流感季节，为避免感染，不应该参加任何户外活动。（重复验证）",answer:!1},{id:128,type:"judge",question:"对传染病患者隔离的主要目的是防止疾病传播。（重复验证）",answer:!0},{id:129,type:"judge",question:"踝关节扭伤，可以立刻热敷和按摩。（重复验证）",answer:!1},{id:130,type:"judge",question:"海姆利克急救法是一种用于解除因异物阻塞气道导致窒息的急救方法。（重复验证）",answer:!0},{id:131,type:"judge",question:"对清醒成年人实施海姆利克急救法时，施救者应站在被救者背后，双腿分开降低重心保持稳定，双手环绕患者腰部，一手握拳，拳眼对准患者肚脐上方两横指的位置，另一手覆盖其上，然后快速向内、向上冲击腹部，通过抬高膈肌产生气流压力将异物排出。",answer:!0},{id:132,type:"judge",question:"当意外落水时，需保持镇定，屏住呼吸，采取仰卧姿势，尽量让口鼻露出水面，等待救援或寻找漂浮物，这是一种有效的自救方法。",answer:!0},{id:133,type:"judge",question:"发现有人落水时，应大声呼救或拨打求助电话，不了解现场水情，切不可轻易下水施救。（重复验证）",answer:!0},{id:134,type:"judge",question:"伤患者倒地，意识丧失，没有呼吸与脉搏，应尽快对其使用体外除颤器（AED），可以增加伤患者存活的机率。",answer:!0},{id:135,type:"judge",question:"在使用全自动体外除颤器（AED）时，要用双手固定伤患者。（重复验证）",answer:!1},{id:136,type:"judge",question:"心肺复苏过程中，若患者恢复了自主呼吸，同时又具备明显的循环特征，说明患者复苏成功，则应将患者放置于复原卧位，并严密监测伤患者的呼吸循环功能。",answer:!0},{id:137,type:"judge",question:"对成人进行心肺复苏时，胸外心脏按压须将胸骨向下按压5-6厘米。（重复验证）",answer:!0},{id:138,type:"judge",question:"为预防中暑，可适量饮用含电解质（如钠盐）的饮料，补充因出汗流失的水分和盐分。（重复验证）",answer:!0},{id:139,type:"judge",question:"台风预警信号分为五级，从低到高分别以白色、蓝色、黄色、橙色和红色表示，黄色及以上预警信号发布时，全市中小学、幼儿园停课。",answer:!0},{id:140,type:"judge",question:'运动时崴脚应立即停止活动，并遵循"RICE原则"，即休息、冰敷、加压、抬高。（重复验证）',answer:!0},{id:141,type:"judge",question:"剧烈运动后身体处于疲劳状态，消化功能暂时减弱，立刻进食可能导致恶心、呕吐等不适。（重复验证）",answer:!0},{id:142,type:"judge",question:"睡眠质量差会影响情绪。（重复验证）",answer:!0},{id:143,type:"judge",question:"在参加800米/1000米测试时，为了节省体力，可以不做准备活动。（重复验证）",answer:!1},{id:144,type:"judge",question:"在比赛前感到紧张是正常的心理现象，适度的紧张可以激发运动员的专注力和运动表现。（重复验证）",answer:!0},{id:145,type:"judge",question:"心理学研究表明，即使在不愉快的情况下，通过积极的自我暗示和运动诱导的神经递质变化，也可以有效转换情绪状态，长期坚持这种策略对提升心理健康和应对生活挑战具有显著效果。",answer:!0},{id:146,type:"judge",question:"心率是反映运动强度的唯一指标。（重复验证）",answer:!1},{id:147,type:"judge",question:"过期药品不能随意丢弃，可以继续使用。（重复验证）",answer:!1},{id:148,type:"judge",question:"青春期经常参加体育锻炼能促进身高增长。（重复验证）",answer:!0},{id:149,type:"judge",question:"青春期生理发育的三大显著特点是身体外形变化、内脏功能健全、性器官发育成熟。（重复验证）",answer:!0},{id:150,type:"judge",question:"适量负重运动有益骨骼生长，坚持锻炼能够使骨骼强壮。（重复验证）",answer:!0},{id:151,type:"judge",question:"在户外运动时遇到雷雨天气，应立即停止运动，寻找安全的避雷场所，远离高耸的树木、电线杆、烟囱等物体。（重复验证）",answer:!0},{id:152,type:"judge",question:"运动结束后可以立即用凉水冲澡降温。（重复验证）",answer:!1},{id:153,type:"judge",question:'截至目前，中国女排已获得11次世界冠军，缔造的"女排精神"成为体育精神的代名词。',answer:!0},{id:154,type:"judge",question:"现行乒乓球比赛规则中，规定一方队员发两个球后需要交换发球权。（重复验证）",answer:!0},{id:155,type:"judge",question:"影响青春期心理健康的主要因素有生理因素、家庭因素，但不包括学校因素和社会因素。（重复验证）",answer:!1},{id:156,type:"judge",question:"运动后及时放松，能加快身体疲劳消除，中小学生每次运动后放松10-15分钟，以静态拉伸为主、按摩为辅。（重复验证）",answe -outline{background:#fff;border:1px solid var(--primary)!important;color:var(--primary)}.btn-outline:hover{background:var(--primary-light)}.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#389e0d}.progress-bar-wrap{background:#f0f0f0;border-radius:10px;height:8px;overflow:hidden;margin-bottom:16px}.progress-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#1677ff,#69b1ff);transition:width .3s}.timer-bar{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff7e6;border:1px solid #ffd591;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:18px;font-weight:600;color:#d46b08}.timer-bar.warning{background:#fff1f0;border-color:#ffa39e;color:#cf1322;animation:pulse 1s infinite}@keyframes pulse{0%,to{opacity:1}50%{opacity:.7}}.exam-result{text-align:center;padding:24px 0}.exam-result .score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px;font-weight:700;color:#fff}.exam-result .score-circle.high{background:linear-gradient(135deg,#52c41a,#73d13d)}.exam-result .score-circle.medium{background:linear-gradient(135deg,#faad14,#ffc53d)}.exam-result .score-circle.low{background:linear-gradient(135deg,#ff4d4f,#ff7875)}.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}.stat-card{background:var(--bg-card);border-radius:var(--radius);padding:16px;text-align:center}.stat-card .stat-value{font-size:28px;font-weight:700;color:var(--primary)}.stat-card .stat-label{font-size:13px;color:var(--text-secondary);margin-top:4px}.filter-bar{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}.filter-bar button{padding:6px 16px;border:1px solid #d9d9d9;border-radius:20px;background:#fff;color:var(--text-secondary);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}.filter-bar button.active{background:var(--primary);color:#fff;border-color:var(--primary)}.filter-bar button:hover:not(.active){border-color:var(--primary);color:var(--primary)}.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;font-size:16px;color:var(--text-secondary)}@media(max-width:600px){.quiz-content{padding:12px}.question-card{padding:16px}.question-text{font-size:15px}.option-item{padding:10px 14px;font-size:14px}.stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}.mode-card{padding:16px}.exam-result .score-circle{width:100px;height:100px;font-size:30px}}@media(min-width:768px){.question-text{font-size:17px}.option-item{padding:14px 18px}}.wrong-item-enter{animation:slideIn .3s ease}@keyframes slideIn{0%{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.empty-state{text-align:center;padding:48px 20px;color:var(--text-secondary)}.empty-state .empty-icon{font-size:48px;margin-bottom:12px}.question-progress{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:13px;color:var(--text-secondary)}.exam-detail-toggle{background:none;border:none;color:var(--primary);cursor:pointer;font-size:14px;padding:8px 0}.exam-detail-toggle:hover{text-decoration:underline}.empty-exam-history{text-align:center;padding:40px 20px;color:var(--text-secondary)}.progress-bar-wrap.clickable{cursor:pointer;position:relative}.progress-bar-wrap.clickable:hover{opacity:.85}.seq-jump-wrap{display:flex;gap:8px;margin-bottom:16px;justify-content:flex-end;align-items:center}.seq-jump-input{width:80px;padding:4px 8px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;text-align:center}.seq-jump-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px #1677ff1a}.seq-jump-btn{padding:4px 12px;border:1px solid var(--primary);border-radius:6px;background:var(--primary);color:#fff;font-size:13px;cursor:pointer;transition:all .2s}.seq-jump-btn:hover{background:#0958d9}</style>
